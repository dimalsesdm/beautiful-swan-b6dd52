<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e05"/>
      <stop offset="40%" stop-color="#3d1f08"/>
      <stop offset="70%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#D4853C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="building1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e05"/>
      <stop offset="100%" stop-color="#0d0704"/>
    </linearGradient>
    <radialGradient id="sun" cx="60%" cy="65%" r="20%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FF8C00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Sky gradient background -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="480" cy="390" r="120" fill="url(#sun)" filter="url(#blur2)"/>
  <circle cx="480" cy="390" r="25" fill="#FFE066" opacity="0.9"/>
  <circle cx="480" cy="390" r="15" fill="#FFFACD"/>

  <!-- Atmospheric haze -->
  <rect x="0" y="320" width="800" height="100" fill="#D4853C" opacity="0.15" filter="url(#blur2)"/>

  <!-- Distant buildings (silhouette) -->
  <rect x="0" y="280" width="800" height="320" fill="#0d0704"/>
  <rect x="50" y="220" width="40" height="180" fill="#0d0704"/>
  <rect x="100" y="200" width="60" height="200" fill="#0a0502"/>
  <rect x="110" y="185" width="15" height="20" fill="#0a0502"/>
  <rect x="170" y="230" width="35" height="170" fill="#0d0704"/>
  <rect x="210" y="210" width="80" height="190" fill="#0a0502"/>
  <rect x="248" y="195" width="8" height="18" fill="#0a0502"/>
  <rect x="300" y="240" width="50" height="160" fill="#0d0704"/>
  <rect x="355" y="180" width="30" height="220" fill="#0a0502"/>
  <rect x="390" y="220" width="45" height="180" fill="#0d0704"/>
  <rect x="440" y="200" width="20" height="200" fill="#0a0502"/>
  <rect x="465" y="250" width="55" height="150" fill="#0d0704"/>
  <rect x="525" y="215" width="70" height="185" fill="#0a0502"/>
  <rect x="558" y="198" width="10" height="20" fill="#0a0502"/>
  <rect x="600" y="235" width="45" height="165" fill="#0d0704"/>
  <rect x="650" y="205" width="60" height="195" fill="#0a0502"/>
  <rect x="715" y="245" width="85" height="155" fill="#0d0704"/>

  <!-- Window lights in buildings -->
  <rect x="112" y="205" width="4" height="3" fill="#FFD700" opacity="0.7"/>
  <rect x="120" y="218" width="4" height="3" fill="#FFA500" opacity="0.6"/>
  <rect x="215" y="225" width="4" height="3" fill="#FFD700" opacity="0.8"/>
  <rect x="228" y="238" width="4" height="3" fill="#FFD700" opacity="0.5"/>
  <rect x="360" y="195" width="4" height="3" fill="#FFA500" opacity="0.7"/>
  <rect x="370" y="210" width="4" height="3" fill="#FFD700" opacity="0.6"/>
  <rect x="530" y="228" width="4" height="3" fill="#FFD700" opacity="0.8"/>
  <rect x="545" y="215" width="4" height="3" fill="#FFA500" opacity="0.7"/>
  <rect x="655" y="218" width="4" height="3" fill="#FFD700" opacity="0.6"/>
  <rect x="670" y="232" width="4" height="3" fill="#FFA500" opacity="0.5"/>

  <!-- Foreground silhouette -->
  <rect x="0" y="420" width="800" height="180" fill="#060302"/>

  <!-- Ground reflection/street -->
  <rect x="0" y="480" width="800" height="120" fill="#0a0502"/>
  <rect x="200" y="490" width="400" height="2" fill="#D4853C" opacity="0.3"/>
  <ellipse cx="480" cy="500" rx="200" ry="30" fill="#D4853C" opacity="0.08"/>

  <!-- Foreground trees/structures -->
  <rect x="0" y="400" width="15" height="200" fill="#060302"/>
  <rect x="760" y="380" width="40" height="220" fill="#060302"/>
  <rect x="730" y="350" width="8" height="250" fill="#060302"/>

  <!-- Film grain overlay effect -->
  <rect width="800" height="600" fill="url(#sky)" opacity="0.03"/>
</svg>

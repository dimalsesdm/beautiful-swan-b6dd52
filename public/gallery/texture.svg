<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="700" height="700">
  <defs>
    <filter id="grunge">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="8" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="rough">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <pattern id="rust-pattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#3d1f08"/>
      <rect x="0" y="0" width="40" height="40" fill="#4a2510" opacity="0.6"/>
      <rect x="40" y="40" width="40" height="40" fill="#5c3015" opacity="0.5"/>
      <circle cx="20" cy="20" r="15" fill="#8B4513" opacity="0.3"/>
      <circle cx="60" cy="60" r="12" fill="#6d3410" opacity="0.4"/>
      <rect x="10" y="35" width="60" height="3" fill="#2d1508" opacity="0.5"/>
    </pattern>
    <linearGradient id="oxide1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="30%" stop-color="#C84B0F"/>
      <stop offset="60%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#4a2510"/>
    </linearGradient>
    <linearGradient id="oxide2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B87333"/>
      <stop offset="50%" stop-color="#D4853C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="crack1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d0704" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0d0704" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#0d0704" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d0704" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base rust layer -->
  <rect width="700" height="700" fill="#2d1508"/>
  <rect width="700" height="700" fill="url(#rust-pattern)" opacity="0.6"/>

  <!-- Oxide patches -->
  <ellipse cx="180" cy="200" rx="160" ry="130" fill="url(#oxide1)" opacity="0.5"/>
  <ellipse cx="520" cy="150" rx="140" ry="110" fill="url(#oxide2)" opacity="0.4"/>
  <ellipse cx="350" cy="400" rx="200" ry="180" fill="#8B4513" opacity="0.35"/>
  <ellipse cx="150" cy="530" rx="130" ry="110" fill="#C84B0F" opacity="0.3"/>
  <ellipse cx="580" cy="520" rx="150" ry="120" fill="#A0522D" opacity="0.35"/>

  <!-- Paint flakes -->
  <rect x="50" y="80" width="80" height="50" rx="3" fill="#1a3a5c" opacity="0.7" transform="rotate(-5 90 105)"/>
  <rect x="200" y="50" width="120" height="35" rx="2" fill="#0d2a4a" opacity="0.6" transform="rotate(3 260 68)"/>
  <rect x="400" y="100" width="90" height="45" rx="4" fill="#1f3d1f" opacity="0.65" transform="rotate(-8 445 123)"/>
  <rect x="550" y="60" width="100" height="40" rx="3" fill="#2a1a0d" opacity="0.7" transform="rotate(6 600 80)"/>
  <rect x="80" y="300" width="70" height="55" rx="2" fill="#3d1a0d" opacity="0.8" transform="rotate(-12 115 328)"/>
  <rect x="500" y="350" width="85" height="50" rx="3" fill="#1a2d1a" opacity="0.7" transform="rotate(9 543 375)"/>

  <!-- Crack lines -->
  <path d="M 100 150 L 180 200 L 220 180 L 290 250" stroke="#0d0704" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 350 80 L 400 140 L 380 200 L 420 270" stroke="#060302" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 500 200 L 560 260 L 530 320 L 590 400" stroke="#0d0704" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 150 420 L 250 480 L 220 550" stroke="#060302" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 400 380 L 460 440 L 440 520 L 500 580" stroke="#0d0704" stroke-width="2" fill="none" opacity="0.65"/>
  <!-- Crack hair lines -->
  <path d="M 180 200 L 165 230" stroke="#0d0704" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 400 140 L 440 155" stroke="#060302" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M 530 320 L 510 355" stroke="#0d0704" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Bright rust streaks (water run-off marks) -->
  <line x1="200" y1="0" x2="210" y2="200" stroke="#E8754A" stroke-width="3" opacity="0.2"/>
  <line x1="380" y1="0" x2="365" y2="180" stroke="#D4853C" stroke-width="2" opacity="0.25"/>
  <line x1="580" y1="0" x2="575" y2="160" stroke="#E8754A" stroke-width="2.5" opacity="0.2"/>
  <line x1="100" y1="300" x2="95" y2="700" stroke="#C84B0F" stroke-width="1.5" opacity="0.15"/>
  <line x1="450" y1="250" x2="440" y2="700" stroke="#D4853C" stroke-width="2" opacity="0.15"/>

  <!-- Dark mold/age patches -->
  <ellipse cx="300" cy="550" rx="100" ry="60" fill="#0a0a0a" opacity="0.4"/>
  <ellipse cx="80" cy="650" rx="80" ry="50" fill="#0a0a0a" opacity="0.35"/>
  <ellipse cx="620" cy="620" rx="90" ry="55" fill="#0a0a0a" opacity="0.4"/>
  <ellipse cx="380" cy="200" rx="60" ry="40" fill="#080808" opacity="0.3"/>

  <!-- Highlight glints -->
  <circle cx="250" cy="175" r="8" fill="#FFD700" opacity="0.15"/>
  <circle cx="480" cy="300" r="6" fill="#E8C070" opacity="0.12"/>
  <circle cx="150" cy="450" r="5" fill="#D4B060" opacity="0.1"/>
</svg>

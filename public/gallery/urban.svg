<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="urban-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="shadow-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="pavement" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1c20"/>
      <stop offset="100%" stop-color="#0a0b0e"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="900" height="600" fill="url(#urban-sky)"/>

  <!-- Building blocks - strict geometric grid -->
  <!-- Background tall buildings -->
  <rect x="0" y="0" width="80" height="400" fill="#0d0f14"/>
  <rect x="85" y="60" width="100" height="340" fill="#0f1118"/>
  <rect x="190" y="20" width="60" height="380" fill="#0d0f14"/>
  <rect x="255" y="80" width="90" height="320" fill="#111318"/>
  <rect x="350" y="0" width="120" height="400" fill="#0d0f14"/>
  <rect x="475" y="50" width="80" height="350" fill="#0f1118"/>
  <rect x="560" y="10" width="110" height="390" fill="#0d0f14"/>
  <rect x="675" y="70" width="75" height="330" fill="#111318"/>
  <rect x="755" y="30" width="145" height="370" fill="#0d0f14"/>

  <!-- Window grids - systematic and geometric -->
  <!-- Building 1 windows -->
  <rect x="10" y="20" width="12" height="8" fill="#E8C060" opacity="0.8"/>
  <rect x="28" y="20" width="12" height="8" fill="#E8C060" opacity="0.5"/>
  <rect x="46" y="20" width="12" height="8" fill="#E8C060" opacity="0.9"/>
  <rect x="10" y="35" width="12" height="8" fill="#B8A040" opacity="0.4"/>
  <rect x="28" y="35" width="12" height="8" fill="#E8C060" opacity="0.7"/>
  <rect x="10" y="50" width="12" height="8" fill="#E8C060" opacity="0.6"/>
  <rect x="46" y="50" width="12" height="8" fill="#B8A040" opacity="0.5"/>

  <!-- Building 2 windows -->
  <rect x="100" y="80" width="10" height="7" fill="#C0D8F0" opacity="0.7"/>
  <rect x="116" y="80" width="10" height="7" fill="#C0D8F0" opacity="0.9"/>
  <rect x="132" y="80" width="10" height="7" fill="#C0D8F0" opacity="0.4"/>
  <rect x="100" y="94" width="10" height="7" fill="#C0D8F0" opacity="0.6"/>
  <rect x="132" y="94" width="10" height="7" fill="#C0D8F0" opacity="0.8"/>
  <rect x="116" y="108" width="10" height="7" fill="#C0D8F0" opacity="0.5"/>
  <rect x="100" y="122" width="10" height="7" fill="#C0D8F0" opacity="0.7"/>
  <rect x="132" y="122" width="10" height="7" fill="#C0D8F0" opacity="0.6"/>

  <!-- Building 3 (center tall) windows - many rows -->
  <rect x="365" y="15" width="10" height="7" fill="#E8C060" opacity="0.8"/>
  <rect x="382" y="15" width="10" height="7" fill="#E8C060" opacity="0.5"/>
  <rect x="399" y="15" width="10" height="7" fill="#E8C060" opacity="0.9"/>
  <rect x="416" y="15" width="10" height="7" fill="#E8C060" opacity="0.3"/>
  <rect x="433" y="15" width="10" height="7" fill="#E8C060" opacity="0.7"/>
  <rect x="365" y="30" width="10" height="7" fill="#E8C060" opacity="0.4"/>
  <rect x="399" y="30" width="10" height="7" fill="#E8C060" opacity="0.8"/>
  <rect x="433" y="30" width="10" height="7" fill="#E8C060" opacity="0.6"/>
  <rect x="365" y="45" width="10" height="7" fill="#E8C060" opacity="0.7"/>
  <rect x="382" y="45" width="10" height="7" fill="#E8C060" opacity="0.9"/>
  <rect x="416" y="45" width="10" height="7" fill="#E8C060" opacity="0.5"/>
  <rect x="433" y="45" width="10" height="7" fill="#E8C060" opacity="0.4"/>

  <!-- Neon sign (horizontal) -->
  <rect x="265" y="150" width="70" height="8" rx="2" fill="#FF3060" filter="url(#neon-glow)" opacity="0.9"/>
  <rect x="265" y="150" width="70" height="8" rx="2" fill="#FF6090" opacity="0.5" filter="url(#soft-glow)"/>

  <!-- Street level -->
  <rect x="0" y="400" width="900" height="200" fill="url(#pavement)"/>

  <!-- Street lines -->
  <rect x="0" y="445" width="900" height="2" fill="#2a2c32" opacity="0.8"/>
  <rect x="0" y="500" width="900" height="1" fill="#2a2c32" opacity="0.5"/>

  <!-- Road marking dashes -->
  <rect x="80" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>
  <rect x="200" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>
  <rect x="320" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>
  <rect x="440" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>
  <rect x="560" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>
  <rect x="680" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>
  <rect x="800" y="472" width="50" height="3" fill="#404248" opacity="0.6"/>

  <!-- Street reflections (wet road) -->
  <rect x="340" y="420" width="5" height="100" fill="#E8C060" opacity="0.15" filter="url(#soft-glow)"/>
  <rect x="475" y="410" width="4" height="110" fill="#C0D8F0" opacity="0.12" filter="url(#soft-glow)"/>
  <rect x="200" y="430" width="3" height="90" fill="#FF3060" opacity="0.08" filter="url(#soft-glow)"/>

  <!-- Traffic light -->
  <rect x="340" y="330" width="8" height="60" fill="#1a1c20"/>
  <circle cx="344" cy="338" r="5" fill="#FF3030" opacity="0.9" filter="url(#neon-glow)"/>
  <circle cx="344" cy="352" r="5" fill="#303030" opacity="0.5"/>
  <circle cx="344" cy="366" r="5" fill="#303030" opacity="0.5"/>

  <!-- Figures/shadows (abstract pedestrians) -->
  <ellipse cx="180" cy="420" rx="8" ry="20" fill="#080a0d" opacity="0.9"/>
  <ellipse cx="520" cy="425" rx="7" ry="18" fill="#080a0d" opacity="0.85"/>
  <ellipse cx="680" cy="418" rx="9" ry="22" fill="#080a0d" opacity="0.8"/>

  <!-- Left shadow vignette -->
  <rect x="0" y="0" width="150" height="600" fill="url(#shadow-left)"/>
</svg>
